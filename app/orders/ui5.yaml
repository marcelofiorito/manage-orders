specVersion: "3.0"
metadata:
  name: com.manage.orders
type: application
framework:
  name: SAPUI5
  version: "1.120.23"
  libraries:
    - name: sap.fe.templates
    - name: sap.m
    - name: sap.ui.core
server:
  customMiddleware:
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertError: false
        backend:
          - path: /odata
            url: http://localhost:4006
          - path: /$metadata
            url: http://localhost:4006
